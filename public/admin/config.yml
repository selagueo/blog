backend:
  name: github
  repo: selagueo/blog
  branch: main
  base_url: https://selagueo.com
  auth_endpoint: api/auth

media_folder: public/images/blog
public_folder: /images/blog

collections:
  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: "Título", name: title, widget: string }
      - { label: "Descripción", name: description, widget: string }
      - { label: "Fecha", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Tags", name: tags, widget: list, default: [] }
      - { label: "Banner", name: banner, widget: image }
      - { label: "Borrador", name: draft, widget: boolean, default: false }
      - { label: "Contenido", name: body, widget: markdown }
